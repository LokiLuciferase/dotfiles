---
- name: Ensure shell support directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - "{{ dotfiles_home }}/.cache/zsh"
    - "{{ dotfiles_home }}/.cache/bash"
    - "{{ dotfiles_home }}/.config"

- name: Install or update oh-my-zsh
  ansible.builtin.git:
    repo: https://github.com/ohmyzsh/ohmyzsh.git
    dest: "{{ dotfiles_home }}/.config/oh-my-zsh"
    depth: 1
    version: master

- name: Install or update oh-my-zsh plugins and theme
  ansible.builtin.git:
    repo: "{{ item.repo }}"
    dest: "{{ dotfiles_home }}/.config/oh-my-zsh/custom/{{ item.dest }}"
    depth: 1
    version: master
  loop:
    - repo: https://github.com/zsh-users/zsh-syntax-highlighting.git
      dest: plugins/zsh-syntax-highlighting
    - repo: https://github.com/zsh-users/zsh-autosuggestions.git
      dest: plugins/zsh-autosuggestions
    - repo: https://github.com/romkatv/powerlevel10k.git
      dest: themes/powerlevel10k
